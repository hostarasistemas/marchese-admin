<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar · Marchese Golosinas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&display=swap" rel="stylesheet">
    <style>
        /* ── TOKENS EXACTOS DEL ADMIN ──────────────────────── */
        :root {
            --bg:           #0F0E0C;
            --surface:      #1A1916;
            --surface-2:    #222018;
            --surface-3:    #2B2926;
            --border:       #2E2C28;
            --border-light: #3D3B36;
            --amber:        #E8920A;
            --amber-dim:    #C47B08;
            --amber-glow:   rgba(232,146,10,0.12);
            --red:          #EF4444;
            --text:         #F0EDE8;
            --text-mid:     #A8A39B;
            --text-muted:   #6B6760;
            --shadow:       0 4px 24px rgba(0,0,0,0.5);
            --radius:       10px;
            --radius-sm:    6px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* ── TARJETA DE LOGIN ──────────────────────────────── */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centrar elementos horizontalmente */
        }
        
        /* Estilos para la imagen del logo */
        .logo-img {
            max-width: 200px; /* Ajusta este valor si la imagen se ve muy grande o muy chica */
            height: auto;
            margin-bottom: 0.5rem; /* Espacio entre el logo y el tag */
        }
        
        .logo-tag {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        /* ── FORMULARIOS Y BOTONES (Igual al admin) ────────── */
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem; }
        
        label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-mid);
            letter-spacing: 0.02em;
        }

        input[type="email"],
        input[type="password"] {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.75rem 0.85rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color .2s;
            width: 100%;
        }
        input:focus { border-color: var(--amber); }
        input::placeholder { color: var(--text-muted); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.45rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem; font-weight: 600;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            border: none; cursor: pointer;
            transition: all .15s;
            width: 100%;
            margin-top: 0.5rem;
        }
        .btn-primary {
            background: var(--amber);
            color: #0F0E0C;
        }
        .btn-primary:hover:not(:disabled) { background: var(--amber-dim); }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* ── TOAST ──────────────────────────────────────────── */
        .toast-container {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            z-index: 200;
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .toast {
            background: var(--surface-3);
            border: 1px solid var(--border-light);
            border-left: 3px solid var(--amber);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1.1rem;
            font-size: 0.82rem;
            color: var(--text);
            box-shadow: var(--shadow);
            animation: slideIn .2s ease;
            max-width: 300px;
        }
        .toast.error { border-left-color: var(--red); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(12px); }
            to   { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <!-- Imagen del logo reemplazando el texto -->
            <img src="https://res.cloudinary.com/dloroyhev/image/upload/f_auto,q_auto,w_800/v1781828885/xzeljnj7dqfhnwajvrtj.png" alt="Marchese Golosinas" class="logo-img">
            <span class="logo-tag">Panel de Administración</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="admin@marchese.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary" id="btnLogin">
                Ingresar al panel
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                </svg>
            </button>
        </form>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="login.js"></script>
</body>
</html>
