<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar · Marchese Golosinas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:           #0F0E0C;
            --surface:      #1A1916;
            --surface-2:    #222018;
            --surface-3:    #2B2926;
            --border:       #2E2C28;
            --border-light: #3D3B36;
            --amber:        #E8920A;
            --amber-dim:    #C47B08;
            --amber-glow:   rgba(232,146,10,0.12);
            --red:          #EF4444;
            --red-dim:      rgba(239,68,68,0.10);
            --text:         #F0EDE8;
            --text-mid:     #A8A39B;
            --text-muted:   #6B6760;
            --shadow:       0 4px 24px rgba(0,0,0,0.5);
            --radius:       10px;
            --radius-sm:    6px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-img {
            max-width: 200px;
            height: auto;
            margin-bottom: 0.5rem;
        }

        .logo-tag {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        /* ── FORMULARIO ── */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
        }

        label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-mid);
            letter-spacing: 0.02em;
        }

        /* Wrapper para input + ojo */
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"].pw-field {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.75rem 0.85rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color .2s, background .2s;
            width: 100%;
        }
        input:focus { border-color: var(--amber); }
        input::placeholder { color: var(--text-muted); }

        /* campo con error */
        input.field-error { border-color: var(--red) !important; background: var(--red-dim); }

        /* campo contraseña: padding derecho para el ojo */
        .pw-field { padding-right: 2.75rem !important; }

        /* botón ojo */
        .toggle-pw {
            position: absolute;
            right: 0.75rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0;
            display: flex;
            align-items: center;
            transition: color .15s;
        }
        .toggle-pw:hover { color: var(--text-mid); }
        .toggle-pw svg { display: block; }

        /* ── BOTÓN SUBMIT ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: all .15s;
            width: 100%;
            margin-top: 0.5rem;
        }
        .btn-primary { background: var(--amber); color: #0F0E0C; }
        .btn-primary:hover:not(:disabled) { background: var(--amber-dim); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        /* ── MENSAJE DE ERROR INLINE ── */
        .form-error {
            display: none;
            align-items: center;
            gap: 0.45rem;
            background: var(--red-dim);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: var(--radius-sm);
            padding: 0.65rem 0.85rem;
            font-size: 0.82rem;
            color: var(--red);
            margin-top: 0.75rem;
            animation: slideDown .2s ease;
        }
        .form-error.visible { display: flex; }
        .form-error svg { flex-shrink: 0; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="https://res.cloudinary.com/dloroyhev/image/upload/f_auto,q_auto,w_800/v1781828885/xzeljnj7dqfhnwajvrtj.png" alt="Marchese Golosinas" class="logo-img">
            <span class="logo-tag">Panel de Administración</span>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="admin@marchese.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrap">
                    <input type="password" id="password" class="pw-field" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar contraseña" tabindex="-1">
                        <!-- ojo cerrado (por defecto, contraseña oculta) -->
                        <svg id="iconEyeOff" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                        </svg>
                        <!-- ojo abierto (cuando se muestra la contraseña) -->
                        <svg id="iconEyeOn" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="btnLogin">
                Ingresar al panel
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                </svg>
            </button>

            <!-- Error inline debajo del botón -->
            <div class="form-error" id="formError" role="alert">
                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                </svg>
                <span id="formErrorText"></span>
            </div>
        </form>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
